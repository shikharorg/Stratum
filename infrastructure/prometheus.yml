global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['stratum-gateway:8000']
  - job_name: identity
    static_configs:
      - targets: ['stratum-identity:8000']
  - job_name: ingestion
    static_configs:
      - targets: ['stratum-ingestion:8000']
  - job_name: retrieval
    static_configs:
      - targets: ['stratum-retrieval:8000']
  - job_name: workflow
    static_configs:
      - targets: ['stratum-workflow:8000']
  - job_name: connectors
    static_configs:
      - targets: ['stratum-connectors:8000']
  - job_name: observer
    static_configs:
      - targets: ['stratum-observer:8000']
  - job_name: evaluation
    static_configs:
      - targets: ['stratum-evaluation:8000']
