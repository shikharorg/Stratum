name: stratum

services:
  postgres:
    image: postgres:15
    container_name: stratum-postgres
    restart: unless-stopped
    labels:
      - "project=stratum"
      - "component=infrastructure"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    networks:
      - stratum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: stratum-redis
    restart: unless-stopped
    labels:
      - "project=stratum"
      - "component=infrastructure"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stratum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stratum-qdrant
    restart: unless-stopped
    labels:
      - "project=stratum"
      - "component=infrastructure"
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - stratum-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stratum-pgadmin
    restart: unless-stopped
    labels:
      - "project=stratum"
      - "component=infrastructure"
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - stratum-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/misc/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: stratum-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    labels:
      - "project=stratum"
      - "component=minio"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - stratum-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || wget --spider -q http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ingestion:
    container_name: stratum-ingestion
    build:
      context: ../
      dockerfile: services/ingestion/Dockerfile
    restart: unless-stopped
    labels:
      - "project=stratum"
      - "component=ingestion"
    env_file: ../services/ingestion/.env.docker
    ports:
      - "8002:8000"
    networks:
      - stratum-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  ingestion-worker:
    container_name: stratum-ingestion-worker
    build:
      context: ../
      dockerfile: services/ingestion/Dockerfile
    restart: unless-stopped
    command: python -m arq app.workers.ingestion_worker.WorkerSettings
    labels:
      - "project=stratum"
      - "component=ingestion-worker"
    env_file: ../services/ingestion/.env.docker
    networks:
      - stratum-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

networks:
  stratum-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  pgadmin_data:
  minio_data:
